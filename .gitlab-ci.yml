image: node:24

stages:
  - test
  - release

variables:
  SAST_EXCLUDED_PATHS: "what, tmp"

# http://docs.gitlab.com/ce/ci/yaml/README.html#cache
cache:
  key:
    files:
      - package.json
    prefix: node_modules
  paths:
    - node_modules/
    - .pnpm-store/

# ------------------------------------------------------------------------------

.z-job-script--versions: &z-job-script--versions
  - node --version
  - npm --version
  - npm install --quiet


test-lint:
  stage: test
  script:
    - *z-job-script--versions

    - npm install eslint-formatter-gitlab
    - npx eslint ./src/ --format gitlab

  artifacts:
    reports:
      codequality: gl-codequality.json


test-PREV:
  stage: test
  image: node:22
  script:
    - *z-job-script--versions

    - npx mocha


test-coverage:
  # latest Node, test+coverage
  stage: test
  script:
    - *z-job-script--versions

    - node tools/nyc-to-c8.mjs .c8rc.json
    - npx c8 mocha

    # - npm install -g codecov
    # - npx codecov --token=${VLB_CI_CODECOV_TOKEN}

  coverage: '/Statements\s*:\s*([\d.%]+).*$/'


release:
  stage: release
  rules:
    # only for tags `v1.1.xxxxxxx(whatever)`
    - if: '$CI_COMMIT_TAG =~ /^release\//'
      when: manual

  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore

  script:
    - *z-job-script--versions

    - npm config set --location=user //registry.npmjs.org/:_authToken="${VLB_CI_NPM_TOKEN}"
    - npm whoami
    - npm publish --provenance
    - npm logout


include:
  - template: Jobs/SAST.gitlab-ci.yml

