image: node:20

cache:
  key: deps-1
  paths:
  - node_modules/

stages:
  - install
  - test
  - deploy

# ------------------------------------------------------------------------------

install.all:
  stage: install
  script:
    - node --version
    - npm --version
    - npm install --quiet

test.test:
  stage: test

  script:
    - npm run test

test.coverage:
  stage: test

  script:
    - npm run coverage

  coverage: '/Statements\s*:\s*([\d.%]+).*$/'

deploy:
  stage: deploy
  # develop only
  rules:
    - if: $CI_COMMIT_TAG =~ /^v(?:\d+.){2}(?:\d+)$/
      when: manual

  script:
    - echo 'deploymen t'
    # - npm publish
